<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務管理アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#eef2f7; padding:20px; }

.panel { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; }

input, select, textarea, button {
  padding:10px; border-radius:8px; border:1px solid #ccc; margin:5px;
}

button { background:#111; color:#fff; cursor:pointer; }

.task {
  border-left:8px solid #999;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* MÀU */
.task.red { background:#fecaca; border-color:#dc2626; }
.task.yellow { background:#fde68a; border-color:#d97706; }
.task.blue { background:#93c5fd; border-color:#2563eb; }
.task.green { background:#86efac; border-color:#16a34a; } /* 未着手 */
.task.gray { background:#f3f4f6; border-color:#6b7280; } /* 完了 */

/* BADGE */
.badge { padding:3px 8px; border-radius:999px; font-size:12px; margin-right:5px; }

.badge.red { background:#dc2626; color:#fff; }
.badge.yellow { background:#d97706; color:#fff; }
.badge.blue { background:#2563eb; color:#fff; }
.badge.green { background:#16a34a; color:#fff; }
.badge.gray { background:#6b7280; color:#fff; }

.warning { color:red; font-weight:bold; margin-top:5px; }

.actions button { margin:3px; }
</style>
</head>

<body>

<h2>業務管理</h2>

<div class="panel">
<input id="title" placeholder="業務内容">
<input id="user" placeholder="担当者">
<input id="date" type="date">

<select id="status">
<option>未着手</option>
<option>対応中</option>
<option>完了</option>
<option>書類待ち</option>
</select>

<select id="priority">
<option>通常</option>
<option>重要</option>
<option>緊急</option>
</select>

<textarea id="note" placeholder="メモ"></textarea>

<button onclick="addTask()">追加</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://hgbkthwqixmguavnyljm.supabase.co";
const SUPABASE_KEY = "sb_publishable_0qE4sc-ilJEv1uazYKGmSQ_l1rVJpUg";

const { createClient } = window.supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

function today() {
  return new Date().toISOString().slice(0,10);
}

function getDays(date){
  if(!date) return "";
  const d = new Date(date);
  const t = new Date(today());
  const diff = Math.ceil((d-t)/(1000*60*60*24));

  if(diff<0) return "遅れ";
  if(diff===0) return "今日";
  return "あと"+diff+"日";
}

function isLate(t){
  return t.work_date && t.work_date < today() && t.status !== "完了";
}

function getColor(t){
  if(isLate(t)) return "red";
  if(t.priority==="緊急") return "red";
  if(t.status==="書類待ち") return "yellow";
  if(t.status==="対応中") return "blue";
  if(t.status==="未着手") return "green";
  if(t.status==="完了") return "gray";
  return "gray";
}

function badge(t){
  let b = "";

  if(t.priority==="緊急") b += `<span class="badge red">緊急</span>`;
  if(isLate(t)) b += `<span class="badge red">遅れ</span>`;
  if(t.status==="書類待ち") b += `<span class="badge red">書類待ち</span>`;

  b += `<span class="badge gray">${t.status}</span>`;

  return b;
}

async function loadTasks(){
  const { data } = await supabase.from("tasks").select("*");

  let tasks = data || [];

  tasks.sort((a,b)=>{
    const aDone = a.status==="完了"?1:0;
    const bDone = b.status==="完了"?1:0;

    if(aDone!==bDone) return aDone - bDone;

    return (a.sort_order||0)-(b.sort_order||0);
  });

  const list = document.getElementById("list");
  list.innerHTML="";

  tasks.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="task "+getColor(t);

    div.innerHTML = `
    <b>${t.title}</b><br>
    ${badge(t)}<br>
    担当: ${t.assigned_to || "未設定"}<br>
    日付: ${t.work_date || ""} (${getDays(t.work_date)})<br>
    ${t.note||""}

    ${t.status==="未着手" && isLate(t) ? `<div class="warning">⚠ 未対応</div>`:""}

    <div class="actions">
    <button onclick="updateStatus('${t.id}','未着手')">未着手</button>
    <button onclick="updateStatus('${t.id}','対応中')">対応中</button>
    <button onclick="updateStatus('${t.id}','完了')">完了</button>
    <button onclick="updateStatus('${t.id}','書類待ち')">書類待ち</button>

    <button onclick="moveUp('${t.id}')">↑</button>
    <button onclick="moveDown('${t.id}')">↓</button>

    <button onclick="deleteTask('${t.id}')">削除</button>
    </div>
    `;

    list.appendChild(div);
  });
}

async function addTask(){
  const title = document.getElementById("title").value;
  const user = document.getElementById("user").value || "未設定";
  const date = document.getElementById("date").value || today();
  const status = document.getElementById("status").value;
  const priority = document.getElementById("priority").value;
  const note = document.getElementById("note").value;

  if(!title){ alert("入力してください"); return;}

  const { data } = await supabase
    .from("tasks")
    .select("sort_order")
    .order("sort_order",{ascending:false})
    .limit(1);

  const next = data && data.length ? data[0].sort_order+1 : 1;

  await supabase.from("tasks").insert([{
    title, assigned_to:user, work_date:date,
    status, priority, note,
    sort_order:next
  }]);

  loadTasks();
}

async function updateStatus(id,status){

  if(status==="完了"){
    const { data } = await supabase
      .from("tasks")
      .select("sort_order")
      .order("sort_order",{ascending:false})
      .limit(1);

    const next = data && data.length ? data[0].sort_order+1 : 1;

    await supabase.from("tasks")
      .update({status:"完了", sort_order:next})
      .eq("id",id);

  }else{
    await supabase.from("tasks")
      .update({status})
      .eq("id",id);
  }

  loadTasks();
}

async function deleteTask(id){
  await supabase.from("tasks").delete().eq("id",id);
  loadTasks();
}

async function moveTask(id,dir){
  const { data } = await supabase
    .from("tasks")
    .select("id,sort_order")
    .order("sort_order",{ascending:true});

  const i = data.findIndex(x=>x.id===id);
  if(i<0) return;

  const j = i+dir;
  if(j<0 || j>=data.length) return;

  const a=data[i];
  const b=data[j];

  await supabase.from("tasks").update({sort_order:-999}).eq("id",a.id);
  await supabase.from("tasks").update({sort_order:a.sort_order}).eq("id",b.id);
  await supabase.from("tasks").update({sort_order:b.sort_order}).eq("id",a.id);

  loadTasks();
}

function moveUp(id){ moveTask(id,-1); }
function moveDown(id){ moveTask(id,1); }

loadTasks();
</script>

</body>
</html>
