<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>業務管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; padding: 20px; }
input, select { padding: 6px; margin: 4px; }
button { margin-left: 5px; }
.card { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
</style>
</head>

<body>

<h2>業務管理アプリ</h2>

<input id="title" placeholder="業務内容">
<select id="status">
  <option>未着手</option>
  <option>対応中</option>
  <option>完了</option>
  <option>書類待ち</option>
</select>

<input id="user" placeholder="担当者">
<input type="date" id="date">

<button onclick="addTask()">追加</button>

<hr>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://hgbkthwqixmguavnyljm.supabase.co";
const SUPABASE_KEY = "sb_publishable_0qE4sc-ilJEv1uazYKGmSQ_l1rVJpUg"; 

const { createClient } = window.supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTasks() {
  const { data } = await supabaseClient
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: false });

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(t => {
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <b>${t.title}</b><br>
      状態: ${t.status}<br>
      担当: ${t.assigned_to}<br>
      日付: ${t.work_date}<br>

      <button onclick="updateStatus('${t.id}','対応中')">対応中</button>
      <button onclick="updateStatus('${t.id}','完了')">完了</button>
      <button onclick="deleteTask('${t.id}')">削除</button>
    `;

    list.appendChild(div);
  });
}

async function addTask() {
  const title = document.getElementById('title').value;
  const status = document.getElementById('status').value;
  const user = document.getElementById('user').value || '未設定';
  const date = document.getElementById('date').value;

  if (!title) {
    alert("業務内容を入力してください");
    return;
  }

  await supabaseClient.from('tasks').insert([
    {
      title: title,
      status: status,
      assigned_to: user,
      work_date: date || new Date().toISOString().slice(0,10)
    }
  ]);

  document.getElementById('title').value = '';
  loadTasks();
}

async function updateStatus(id, status) {
  await supabaseClient
    .from('tasks')
    .update({ status: status })
    .eq('id', id);

  loadTasks();
}

async function deleteTask(id) {
  await supabaseClient
    .from('tasks')
    .delete()
    .eq('id', id);

  loadTasks();
}

loadTasks();
</script>

</body>
</html>
