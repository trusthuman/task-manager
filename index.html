<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務管理アプリ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:10px; }

.red { border-left:5px solid red; }
.yellow { border-left:5px solid orange; }
.gray { background:#eee; }

button { margin:3px; }
</style>
</head>

<body>
<div class="container">

<h2>業務管理アプリ</h2>

<!-- 入力 -->
<div class="card">
<input id="title" placeholder="業務内容"><br><br>

<input id="person" placeholder="担当者">
<input type="date" id="date"><br><br>

<select id="status">
<option>未着手</option>
<option>対応中</option>
<option>完了</option>
<option>書類待ち</option>
</select>

<select id="priority">
<option>通常</option>
<option>緊急</option>
</select>

<br><br>
<button onclick="addTask()">追加</button>
<button onclick="copyYesterday()">昨日の未完了コピー</button>

</div>

<!-- フィルター -->
<div class="card">
<input id="filterPerson" placeholder="担当者で絞り込み" oninput="loadTasks()">
</div>

<h3>業務一覧</h3>
<div id="list"></div>

<h3 style="color:red">遅延一覧</h3>
<div id="late"></div>

</div>

<script>
const supabase = supabase.createClient(
"https://hgbkthwqixmguavnyljm.supabase.co",
"YOUR_KEY_HERE"
)

async function addTask() {
const title = document.getElementById("title").value

if(!title) return alert("入力してください")

await supabase.from("tasks").insert([{
title,
assigned_to: document.getElementById("person").value,
work_date: document.getElementById("date").value,
status: document.getElementById("status").value,
priority: document.getElementById("priority").value
}])

loadTasks()
}

async function loadTasks() {
const personFilter = document.getElementById("filterPerson").value

let { data } = await supabase
.from("tasks")
.select("*")

let list = document.getElementById("list")
let late = document.getElementById("late")

list.innerHTML=""
late.innerHTML=""

const today = new Date().toISOString().slice(0,10)

data.sort((a,b)=>{
if(a.status==="完了") return 1
if(b.status==="完了") return -1
return (a.sort_order||0)-(b.sort_order||0)
})

data.forEach(t=>{

if(personFilter && !t.assigned_to.includes(personFilter)) return

let div = document.createElement("div")
div.className="card"

if(t.priority==="緊急") div.classList.add("red")
if(t.status==="書類待ち") div.classList.add("yellow")
if(t.status==="完了") div.classList.add("gray")

div.innerHTML=`
<b>${t.title}</b><br>
担当:${t.assigned_to}<br>
日付:${t.work_date}<br>
状態:${t.status}<br>

<button onclick="update('${t.id}','未着手')">未着手</button>
<button onclick="update('${t.id}','対応中')">対応中</button>
<button onclick="update('${t.id}','完了')">完了</button>

<button onclick="move('${t.id}',-1)">↑</button>
<button onclick="move('${t.id}',1)">↓</button>

<button onclick="del('${t.id}')">削除</button>
`

if(t.work_date < today && t.status !== "完了"){
late.appendChild(div.cloneNode(true))
}

list.appendChild(div)
})
}

async function update(id, status){
await supabase.from("tasks").update({status}).eq("id",id)
loadTasks()
}

async function del(id){
await supabase.from("tasks").delete().eq("id",id)
loadTasks()
}

async function move(id, direction){
let { data } = await supabase.from("tasks").select("*")

data.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))

let index = data.findIndex(x=>x.id===id)
let target = index + direction

if(target<0 || target>=data.length) return

let temp = data[index].sort_order || index
data[index].sort_order = data[target].sort_order || target
data[target].sort_order = temp

await supabase.from("tasks").update({sort_order:data[index].sort_order}).eq("id",data[index].id)
await supabase.from("tasks").update({sort_order:data[target].sort_order}).eq("id",data[target].id)

loadTasks()
}

async function copyYesterday(){

const yesterday = new Date()
yesterday.setDate(yesterday.getDate()-1)
const y = yesterday.toISOString().slice(0,10)

let { data } = await supabase
.from("tasks")
.select("*")
.eq("work_date",y)
.neq("status","完了")

let today = new Date().toISOString().slice(0,10)

for(let t of data){
await supabase.from("tasks").insert([{
title: t.title,
assigned_to: t.assigned_to,
work_date: today,
status: "未着手",
priority: t.priority
}])
}

loadTasks()
}

loadTasks()
</script>
</body>
</html>
