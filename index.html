<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>業務管理アプリ Level 1</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #eef2f7; color: #1f2937; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .hidden { display: none !important; }
    .panel { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 14px rgba(15,23,42,.08); margin-bottom: 16px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    h1 { margin: 0; font-size: 30px; font-weight: 800; color: #0f172a; }
    .sub { font-size: 13px; color: #6b7280; }
    input, select, textarea, button { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 15px; outline: none; }
    textarea { resize: vertical; min-height: 84px; }
    input:focus, select:focus, textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    button { border: none; background: #0f172a; color: #fff; cursor: pointer; font-weight: 700; }
    button.secondary { background: #e5e7eb; color: #111827; }
    button.danger { background: #dc2626; }
    .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 10px; }
    .full { grid-column: 1 / -1; }
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 4px 14px rgba(15,23,42,.06); }
    .stat-title { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; }
    .task { border-radius: 18px; padding: 16px; margin-bottom: 14px; border-left: 9px solid #6b7280; background: #fff; box-shadow: 0 4px 14px rgba(15,23,42,.06); }
    .task.red { background: #fecaca; border-color: #dc2626; }
    .task.yellow { background: #fde68a; border-color: #d97706; }
    .task.blue { background: #93c5fd; border-color: #2563eb; }
    .task.green { background: #86efac; border-color: #16a34a; }
    .task.gray { background: #f3f4f6; border-color: #6b7280; }
    .task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .task-title { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 8px; }
    .meta { font-size: 14px; line-height: 1.8; }
    .badge { display: inline-block; padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 800; margin-right: 6px; margin-bottom: 6px; background: rgba(255,255,255,.8); color: #111827; }
    .badge-red { background: #dc2626; color: #fff; }
    .badge-yellow { background: #d97706; color: #fff; }
    .badge-blue { background: #2563eb; color: #fff; }
    .badge-green { background: #16a34a; color: #fff; }
    .badge-gray { background: #6b7280; color: #fff; }
    .note { margin-top: 10px; padding: 10px 12px; background: rgba(255,255,255,.65); border-radius: 12px; font-size: 14px; }
    .warning { margin-top: 10px; color: #991b1b; font-weight: 800; font-size: 14px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .actions button { width: auto; min-width: 68px; padding: 10px 12px; font-size: 13px; border-radius: 11px; }
    .empty { background: #fff; border-radius: 16px; padding: 30px; text-align: center; color: #6b7280; box-shadow: 0 4px 14px rgba(15,23,42,.06); }
    .role { padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .role.manager { background: #dbeafe; color: #1d4ed8; }
    .role.staff { background: #dcfce7; color: #15803d; }
    .auth-wrap { max-width: 560px; margin: 40px auto; }
    .hint { margin-top: 8px; font-size: 13px; color: #6b7280; }
    .section-title { font-size: 18px; font-weight: 800; margin: 8px 0 14px; }
    @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } .grid3 { grid-template-columns: 1fr; } }
    @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } .task-top { flex-direction: column; } h1 { font-size: 26px; } .stats { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="authScreen" class="auth-wrap">
      <div class="panel">
        <h1>業務管理アプリ</h1>
        <div class="sub">Level 1: ログイン / 権限 / 担当者別表示</div>
        <div class="grid2" style="margin-top:14px">
          <input id="authEmail" type="email" placeholder="メールアドレス" />
          <input id="authPassword" type="password" placeholder="パスワード" />
          <input id="authName" class="full" placeholder="表示名（新規登録時のみ）" />
          <select id="authRole" class="full">
            <option value="staff">社員</option>
            <option value="manager">管理者</option>
          </select>
          <button onclick="signIn()">ログイン</button>
          <button class="secondary" onclick="signUp()">新規登録</button>
        </div>
        <div class="hint">新規登録後、確認メールが来る設定の場合はメール確認後にログインしてください。</div>
      </div>
    </div>

    <div id="appScreen" class="hidden">
      <div class="topbar">
        <div>
          <h1>業務管理アプリ</h1>
          <div class="sub" id="userInfo"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="secondary" onclick="loadTasks()">再読み込み</button>
          <button class="danger" onclick="signOutUser()">ログアウト</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-title">総件数</div><div class="stat-value" id="stat-total">0</div></div>
        <div class="stat"><div class="stat-title">未着手</div><div class="stat-value" id="stat-todo">0</div></div>
        <div class="stat"><div class="stat-title">対応中</div><div class="stat-value" id="stat-doing">0</div></div>
        <div class="stat"><div class="stat-title">完了</div><div class="stat-value" id="stat-done">0</div></div>
        <div class="stat"><div class="stat-title">遅延</div><div class="stat-value" id="stat-late">0</div></div>
      </div>

      <div class="panel">
        <div class="grid2">
          <input id="title" class="full" placeholder="業務内容" />
          <input id="user" placeholder="担当者" />
          <input id="date" type="date" />
          <select id="status">
            <option value="未着手">未着手</option>
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
            <option value="書類待ち">書類待ち</option>
          </select>
          <select id="priority">
            <option value="通常">通常</option>
            <option value="重要">重要</option>
            <option value="緊急">緊急</option>
          </select>
          <textarea id="note" class="full" placeholder="メモ・結果・連絡内容"></textarea>
          <button class="full" onclick="addTask()">追加</button>
        </div>
        <div class="hint">管理者は全件表示、社員は自分の担当業務のみ表示されます。完了は自動で下へ移動します。</div>
      </div>

      <div class="panel">
        <div class="grid3">
          <input id="search" placeholder="検索..." oninput="loadTasks()" />
          <select id="filterStatus" onchange="loadTasks()">
            <option value="">全ての状態</option>
            <option value="未着手">未着手</option>
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
            <option value="書類待ち">書類待ち</option>
          </select>
          <input id="filterUser" placeholder="担当者で絞り込み" oninput="loadTasks()" />
        </div>
      </div>

      <div class="section-title">業務一覧</div>
      <div id="list"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://hgbkthwqixmguavnyljm.supabase.co";
    const SUPABASE_KEY = "sb_publishable_0qE4sc-ilJEv1uazYKGmSQ_l1rVJpUg";
    const { createClient } = window.supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;
    let isLoadingProfile = false;

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function getDaysText(date) {
      if (!date) return "";
      const today = new Date(todayStr());
      const target = new Date(date);
      const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
      if (diff < 0) return `遅れ ${Math.abs(diff)}日`;
      if (diff === 0) return "今日";
      return `あと${diff}日`;
    }

    function isLate(task) {
      return !!task.work_date && task.work_date < todayStr() && task.status !== "完了";
    }

    function escapeHtml(v) {
      if (v == null) return "";
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setScreen(loggedIn) {
      document.getElementById("authScreen").classList.toggle("hidden", loggedIn);
      document.getElementById("appScreen").classList.toggle("hidden", !loggedIn);
    }

    function getTaskColor(task) {
      if (task.status === "完了") return "gray";
      if (isLate(task)) return "red";
      if (task.priority === "緊急") return "red";
      if (task.status === "書類待ち") return "yellow";
      if (task.status === "対応中") return "blue";
      if (task.status === "未着手") return "green";
      return "gray";
    }

    function renderBadge(task) {
      if (task.status === "完了") {
        return `<span class="badge badge-gray">完了</span><span class="badge badge-gray">${escapeHtml(task.priority || "通常")}</span>`;
      }
      let html = "";
      if (task.priority === "緊急") html += `<span class="badge badge-red">緊急</span>`;
      else if (task.priority === "重要") html += `<span class="badge badge-yellow">重要</span>`;
      else html += `<span class="badge badge-gray">通常</span>`;
      if (isLate(task)) html += `<span class="badge badge-red">期限超過</span>`;
      if (task.status === "書類待ち") html += `<span class="badge badge-red">書類待ち</span>`;
      else if (task.status === "対応中") html += `<span class="badge badge-blue">対応中</span>`;
      else if (task.status === "未着手") html += `<span class="badge badge-green">未着手</span>`;
      return html;
    }

    async function writeLog(action, taskId, detail) {
      if (!currentUser) return;
      try {
        await supabaseClient.from("task_logs").insert([{
          user_id: currentUser.id,
          user_email: currentUser.email,
          user_name: currentProfile?.display_name || currentUser.email,
          action,
          task_id: taskId || null,
          detail: detail || ""
        }]);
      } catch (_) {}
    }

    async function signUp() {
      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPassword").value;
      const displayName = document.getElementById("authName").value.trim();
      const role = document.getElementById("authRole").value;
      if (!email || !password || !displayName) {
        alert("メール・パスワード・表示名を入力してください");
        return;
      }
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) {
        alert("登録エラー: " + error.message);
        return;
      }
      const userId = data.user?.id;
      if (userId) {
        const { error: profileError } = await supabaseClient.from("profiles").upsert([{
          id: userId,
          email,
          display_name: displayName,
          role
        }]);
        if (profileError) {
          alert("プロフィール作成エラー: " + profileError.message);
          return;
        }
      }
      alert("登録しました。確認メールが必要な場合は確認後にログインしてください。");
    }

    async function signIn() {
      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPassword").value;
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        alert("ログインエラー: " + error.message);
      }
    }

    async function signOutUser() {
      await supabaseClient.auth.signOut();
    }

    async function loadCurrentProfile() {
      if (!currentUser || isLoadingProfile) return null;
      isLoadingProfile = true;
      try {
        const { data, error } = await supabaseClient
          .from("profiles")
          .select("*")
          .eq("id", currentUser.id)
          .single();

        if (error) {
          alert("プロフィール取得エラー: " + error.message);
          return null;
        }

        currentProfile = data;
        document.getElementById("userInfo").innerHTML = `ログイン中: <b>${escapeHtml(data.display_name || currentUser.email)}</b> <span class="role ${data.role === "manager" ? "manager" : "staff"}">${data.role === "manager" ? "管理者" : "社員"}</span>`;

        const userInput = document.getElementById("user");
        const filterUser = document.getElementById("filterUser");
        if (data.role === "staff") {
          userInput.value = data.display_name || currentUser.email;
          userInput.disabled = true;
          filterUser.value = data.display_name || currentUser.email;
          filterUser.disabled = true;
        } else {
          userInput.disabled = false;
          filterUser.disabled = false;
        }
        return data;
      } finally {
        isLoadingProfile = false;
      }
    }

    function renderStats(tasks) {
      document.getElementById("stat-total").textContent = tasks.length;
      document.getElementById("stat-todo").textContent = tasks.filter(t => t.status === "未着手").length;
      document.getElementById("stat-doing").textContent = tasks.filter(t => t.status === "対応中").length;
      document.getElementById("stat-done").textContent = tasks.filter(t => t.status === "完了").length;
      document.getElementById("stat-late").textContent = tasks.filter(t => isLate(t)).length;
    }

    function renderTasks(tasks) {
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (!tasks.length) {
        list.innerHTML = `<div class="empty">業務がありません。</div>`;
        return;
      }

      tasks.forEach((t, index) => {
        const canEdit = currentProfile?.role === "manager" || (t.owner_id === currentUser.id);
        const div = document.createElement("div");
        div.className = `task ${getTaskColor(t)}`;
        div.innerHTML = `
          <div class="task-top">
            <div>
              <div class="task-title">${escapeHtml(t.title || "(無題)")}</div>
              <div>${renderBadge(t)}</div>
              <div class="meta">
                担当者: ${escapeHtml(t.assigned_to || "未設定")}<br>
                日付: ${escapeHtml(t.work_date || "")} ${t.work_date ? `(${escapeHtml(getDaysText(t.work_date))})` : ""}
              </div>
              ${t.note ? `<div class="note">${escapeHtml(t.note)}</div>` : ""}
              ${(t.status === "未着手" && isLate(t)) ? `<div class="warning">⚠ 未対応のまま期限を超過しています</div>` : ""}
            </div>
            <div><b>順位: ${index + 1}</b></div>
          </div>
          <div class="actions">
            ${canEdit ? `
              <button onclick="updateStatus('${t.id}','未着手')">未着手</button>
              <button onclick="updateStatus('${t.id}','対応中')">対応中</button>
              <button onclick="updateStatus('${t.id}','完了')">完了</button>
              <button onclick="updateStatus('${t.id}','書類待ち')">書類待ち</button>
              <button class="secondary" onclick="editTask('${t.id}')">編集</button>
              <button class="secondary" onclick="moveUp('${t.id}')">↑ 上へ</button>
              <button class="secondary" onclick="moveDown('${t.id}')">↓ 下へ</button>
              <button class="danger" onclick="deleteTask('${t.id}')">削除</button>
            ` : ""}
          </div>
        `;
        list.appendChild(div);
      });
    }

    async function loadTasks() {
      if (!currentUser || !currentProfile) return;
      let query = supabaseClient.from("tasks").select("*");
      if (currentProfile.role !== "manager") {
        query = query.eq("owner_id", currentUser.id);
      }
      const { data, error } = await query;
      if (error) {
        alert("読込エラー: " + error.message);
        return;
      }

      const tasks = (data || []).map(t => ({
        ...t,
        priority: t.priority || "通常",
        status: t.status || "未着手",
        assigned_to: t.assigned_to || "未設定",
        note: t.note || "",
        sort_order: typeof t.sort_order === "number" ? t.sort_order : 999999
      }));

      const search = (document.getElementById("search").value || "").toLowerCase();
      const filterStatus = document.getElementById("filterStatus").value || "";
      const filterUser = (document.getElementById("filterUser").value || "").toLowerCase();

      const filtered = tasks.filter(t => {
        const matchSearch =
          (t.title || "").toLowerCase().includes(search) ||
          (t.assigned_to || "").toLowerCase().includes(search) ||
          (t.note || "").toLowerCase().includes(search);
        const matchStatus = !filterStatus || t.status === filterStatus;
        const matchUser = !filterUser || (t.assigned_to || "").toLowerCase().includes(filterUser);
        return matchSearch && matchStatus && matchUser;
      });

      filtered.sort((a, b) => {
        const aDone = a.status === "完了" ? 1 : 0;
        const bDone = b.status === "完了" ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        return a.sort_order - b.sort_order;
      });

      renderStats(filtered);
      renderTasks(filtered);
    }

    async function addTask() {
      if (!currentUser || !currentProfile) return;
      const title = document.getElementById("title").value.trim();
      const assigned_to = currentProfile.role === "staff"
        ? (currentProfile.display_name || currentUser.email)
        : (document.getElementById("user").value.trim() || "未設定");
      const work_date = document.getElementById("date").value || todayStr();
      const status = document.getElementById("status").value;
      const priority = document.getElementById("priority").value;
      const note = document.getElementById("note").value.trim();

      if (!title) {
        alert("業務内容を入力してください");
        return;
      }

      const { data: maxData, error: maxError } = await supabaseClient
        .from("tasks")
        .select("sort_order")
        .order("sort_order", { ascending: false })
        .limit(1);

      if (maxError) {
        alert("追加準備エラー: " + maxError.message);
        return;
      }

      const nextSortOrder =
        maxData && maxData.length && typeof maxData[0].sort_order === "number"
          ? maxData[0].sort_order + 1
          : 1;

      const ownerId = currentProfile.role === "staff" ? currentUser.id : currentUser.id;

      const { data: inserted, error } = await supabaseClient
        .from("tasks")
        .insert([{
          title,
          assigned_to,
          work_date,
          status,
          priority,
          note,
          sort_order: nextSortOrder,
          owner_id: ownerId,
          created_by: currentUser.id
        }])
        .select()
        .single();

      if (error) {
        alert("追加エラー: " + error.message);
        return;
      }

      await writeLog("create", inserted?.id, `title=${title}`);

      document.getElementById("title").value = "";
      if (currentProfile.role === "manager") document.getElementById("user").value = "";
      document.getElementById("date").value = "";
      document.getElementById("status").value = "未着手";
      document.getElementById("priority").value = "通常";
      document.getElementById("note").value = "";

      await loadTasks();
    }

    async function updateStatus(id, status) {
      if (status === "完了") {
        const { data: maxData, error: maxError } = await supabaseClient
          .from("tasks")
          .select("sort_order")
          .order("sort_order", { ascending: false })
          .limit(1);

        if (maxError) {
          alert("更新エラー: " + maxError.message);
          return;
        }

        const nextSortOrder =
          maxData && maxData.length && typeof maxData[0].sort_order === "number"
            ? maxData[0].sort_order + 1
            : 1;

        const { error } = await supabaseClient
          .from("tasks")
          .update({ status: "完了", sort_order: nextSortOrder, updated_by: currentUser.id })
          .eq("id", id);

        if (error) {
          alert("更新エラー: " + error.message);
          return;
        }

        await writeLog("status", id, "完了");
        await loadTasks();
        return;
      }

      const { error } = await supabaseClient
        .from("tasks")
        .update({ status, updated_by: currentUser.id })
        .eq("id", id);

      if (error) {
        alert("更新エラー: " + error.message);
        return;
      }

      await writeLog("status", id, status);
      await loadTasks();
    }

    async function editTask(id) {
      const { data, error } = await supabaseClient
        .from("tasks")
        .select("*")
        .eq("id", id)
        .single();

      if (error) {
        alert("取得エラー: " + error.message);
        return;
      }

      const newTitle = prompt("業務内容を入力してください", data.title || "");
      if (newTitle === null) return;
      if (!newTitle.trim()) {
        alert("業務内容は必須です");
        return;
      }

      const newUser = currentProfile.role === "staff"
        ? (currentProfile.display_name || currentUser.email)
        : prompt("担当者を入力してください", data.assigned_to || "未設定");
      if (newUser === null) return;

      const newDate = prompt("日付を入力してください（例: 2026-04-22）", data.work_date || todayStr());
      if (newDate === null) return;

      const newNote = prompt("メモを入力してください", data.note || "");
      if (newNote === null) return;

      const { error: updateError } = await supabaseClient
        .from("tasks")
        .update({
          title: newTitle.trim(),
          assigned_to: (newUser || "").trim() || "未設定",
          work_date: newDate || todayStr(),
          note: newNote.trim(),
          updated_by: currentUser.id
        })
        .eq("id", id);

      if (updateError) {
        alert("編集エラー: " + updateError.message);
        return;
      }

      await writeLog("edit", id, `title=${newTitle.trim()}`);
      await loadTasks();
    }

    async function deleteTask(id) {
      if (!confirm("この業務を削除しますか？")) return;
      const { error } = await supabaseClient.from("tasks").delete().eq("id", id);
      if (error) {
        alert("削除エラー: " + error.message);
        return;
      }
      await writeLog("delete", id, "deleted");
      await loadTasks();
    }

    async function moveTask(id, direction) {
      let query = supabaseClient.from("tasks").select("id, sort_order, status");
      if (currentProfile.role !== "manager") query = query.eq("owner_id", currentUser.id);
      const { data, error } = await query;
      if (error) {
        alert("並び替えエラー: " + error.message);
        return;
      }

      const activeTasks = (data || []).filter(t => t.status !== "完了").sort((a, b) => a.sort_order - b.sort_order);
      const index = activeTasks.findIndex(t => t.id === id);
      if (index === -1) return;
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= activeTasks.length) return;

      const current = activeTasks[index];
      const target = activeTasks[targetIndex];
      const currentOrder = current.sort_order;
      const targetOrder = target.sort_order;

      const { error: err1 } = await supabaseClient.from("tasks").update({ sort_order: -999999 }).eq("id", current.id);
      if (err1) { alert("並び替えエラー: " + err1.message); return; }
      const { error: err2 } = await supabaseClient.from("tasks").update({ sort_order: currentOrder }).eq("id", target.id);
      if (err2) { alert("並び替えエラー: " + err2.message); return; }
      const { error: err3 } = await supabaseClient.from("tasks").update({ sort_order: targetOrder }).eq("id", current.id);
      if (err3) { alert("並び替えエラー: " + err3.message); return; }

      await writeLog("sort", id, direction === -1 ? "up" : "down");
      await loadTasks();
    }

    function moveUp(id) { moveTask(id, -1); }
    function moveDown(id) { moveTask(id, 1); }

    async function bootApp() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) {
        setScreen(false);
        return;
      }
      currentUser = data.user || null;
      if (!currentUser) {
        currentProfile = null;
        setScreen(false);
        return;
      }
      setScreen(true);
      const profile = await loadCurrentProfile();
      if (profile) await loadTasks();
    }

    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      currentUser = session?.user || null;
      if (!currentUser) {
        currentProfile = null;
        setScreen(false);
        return;
      }
      if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED') {
        setScreen(true);
        const profile = await loadCurrentProfile();
        if (profile) await loadTasks();
      }
    });

    bootApp();
  </script>
</body>
</html>
