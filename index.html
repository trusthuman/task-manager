<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#eef2f7;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
h1{text-align:center;font-size:32px;margin:0;font-weight:900}

/* GOLD SLOGAN FIXED */
.main-slogan{
text-align:center;
font-size:34px;
font-weight:900;
margin-top:10px;
background:linear-gradient(135deg,#fff7cc,#ffd700,#ffef8a,#d4a017);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 2px 6px rgba(0,0,0,0.25);
}

.panel{background:#fff;border-radius:12px;padding:15px;margin:15px 0}
input,select,textarea,button{width:100%;padding:10px;margin:5px 0}
button{cursor:pointer}

.task{background:#fff;padding:15px;margin-bottom:10px;border-left:6px solid #999}
.task.red{border-color:#dc2626}
.task.green{border-color:#16a34a}
.task.blue{border-color:#2563eb}
.task.yellow{border-color:#d97706}
.task.gray{border-color:#6b7280}

.actions button{width:auto;margin-right:5px}

.week-slogan{
margin-top:20px;
padding:20px;
border-radius:12px;
color:#fff;
text-align:center;
font-weight:900;
}
</style>
</head>
<body>
<div class="container">

<h1>業務管理</h1>
<div class="main-slogan">Trust Humanの成長は、私たち一人一人の責任から。</div>

<div class="panel">
<input id="title" placeholder="業務内容">
<input id="person" placeholder="担当者">
<input id="date" type="date">
<select id="status">
<option>未着手</option>
<option>対応中</option>
<option>完了</option>
<option>書類待ち</option>
</select>
<select id="priority">
<option>通常</option>
<option>緊急</option>
</select>
<textarea id="note" placeholder="メモ"></textarea>
<button onclick="addTask()">追加</button>
</div>

<div id="list"></div>

<div class="week-slogan" id="sloganBox">
<div id="sloganMain"></div>
<div id="sloganSub"></div>
</div>

</div>

<script>
const { createClient } = window.supabase;
const supabaseClient = createClient(
"https://hgbkthwqixmguavnyljm.supabase.co",
"sb_publishable_0qE4sc-ilJEv1uazYKGmSQ_l1rVJpUg"
);

function today(){return new Date().toISOString().slice(0,10)}

function updateSlogan(){
const now=new Date();
const d=now.getDay();
const h=now.getHours();
const box=document.getElementById("sloganBox");

const colors=[
["#0f766e","#14b8a6"],
["#1d4ed8","#3b82f6"],
["#0f766e","#10b981"],
["#7c3aed","#a855f7"],
["#b45309","#f59e0b"],
["#be123c","#f43f5e"],
["#374151","#6b7280"]
];

const msg={
0:["来週の準備で差がつく","準備の質が結果を決める"],
1:["最初の動きで流れが決まる","スタートで差をつけろ"],
2:["前進し続ける日","止まったら負け"],
3:["責任の差が出る日","結果で示せ"],
4:["やり残しを減らす日","後回し禁止"],
5:["結果で締める日","最後までやり切る"],
6:["積み上げる日","基本が信頼を作る"]
};

let timeMsg;
if(h<12) timeMsg="朝はスタートで差をつける";
else if(h<17) timeMsg="途中で止まるな、結果までやれ";
else timeMsg="今日の責任は今日終わらせる";

box.style.background=`linear-gradient(135deg,${colors[d][0]},${colors[d][1]})`;
document.getElementById("sloganMain").innerText=msg[d][0];
document.getElementById("sloganSub").innerText=timeMsg;
}

function getColor(t){
if(t.status==="完了") return "gray";
if(t.priority==="緊急") return "red";
if(t.status==="対応中") return "blue";
if(t.status==="書類待ち") return "yellow";
return "green";
}

function build(t){
const div=document.createElement("div");
div.className="task "+getColor(t);
div.innerHTML=`
<b>${t.title}</b><br>
担当:${t.assigned_to||""}<br>
日付:${t.work_date||""}<br>
状態:${t.status}
<div class="actions">
<button onclick="editTask('${t.id}')">編集</button>
<button onclick="updateStatus('${t.id}','完了')">完了</button>
<button onclick="deleteTask('${t.id}')">削除</button>
</div>
`;
return div;
}

async function load(){
const {data}=await supabaseClient.from("tasks").select("*");
const list=document.getElementById("list");
list.innerHTML="";
(data||[]).forEach(t=>list.appendChild(build(t)));
}

async function addTask(){
const {error}=await supabaseClient.from("tasks").insert([{
title:document.getElementById("title").value,
assigned_to:document.getElementById("person").value,
work_date:document.getElementById("date").value||today(),
status:document.getElementById("status").value,
priority:document.getElementById("priority").value,
note:document.getElementById("note").value
}]);
if(error){alert(error.message);return}
load();
}

async function updateStatus(id,s){
await supabaseClient.from("tasks").update({status:s}).eq("id",id);
load();
}

async function deleteTask(id){
await supabaseClient.from("tasks").delete().eq("id",id);
load();
}

async function editTask(id){
const {data}=await supabaseClient.from("tasks").select("*").eq("id",id).single();
const title=prompt("内容",data.title);
if(title===null)return;
const date=prompt("日付",data.work_date);
if(date===null)return;
await supabaseClient.from("tasks").update({title,work_date:date}).eq("id",id);
load();
}

updateSlogan();
load();
</script>
</body>
</html>
